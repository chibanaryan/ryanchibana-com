<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" fill="#0f1117" rx="8"/>

  <!-- PubMed API -->
  <rect x="30" y="40" width="140" height="80" rx="6" fill="none" stroke="#6b7280" stroke-width="1.5"/>
  <text x="100" y="72" text-anchor="middle" fill="#e5e7eb" font-size="13" font-weight="600">PubMed</text>
  <text x="100" y="92" text-anchor="middle" fill="#9ca3af" font-size="11">E-utils API</text>

  <!-- Airflow -->
  <rect x="240" y="40" width="140" height="80" rx="6" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="310" y="72" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="600">Airflow</text>
  <text x="310" y="92" text-anchor="middle" fill="#9ca3af" font-size="11">Ingestion DAG</text>

  <!-- Arrow: PubMed -> Airflow -->
  <line x1="170" y1="80" x2="235" y2="80" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Postgres -->
  <rect x="460" y="40" width="170" height="80" rx="6" fill="none" stroke="#34d399" stroke-width="1.5"/>
  <text x="545" y="68" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="600">PostgreSQL</text>
  <text x="545" y="88" text-anchor="middle" fill="#9ca3af" font-size="11">pgvector + HNSW</text>

  <!-- Arrow: Airflow -> Postgres -->
  <line x1="380" y1="80" x2="455" y2="80" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- FastAPI -->
  <rect x="700" y="40" width="160" height="80" rx="6" fill="none" stroke="#f472b6" stroke-width="1.5"/>
  <text x="780" y="68" text-anchor="middle" fill="#f9a8d4" font-size="13" font-weight="600">FastAPI</text>
  <text x="780" y="88" text-anchor="middle" fill="#9ca3af" font-size="11">Serving + Metrics</text>

  <!-- Arrow: Postgres -> FastAPI -->
  <line x1="630" y1="80" x2="695" y2="80" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Embedding Pipeline -->
  <rect x="300" y="190" width="200" height="80" rx="6" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="400" y="222" text-anchor="middle" fill="#fde68a" font-size="13" font-weight="600">Embedding Pipeline</text>
  <text x="400" y="242" text-anchor="middle" fill="#9ca3af" font-size="11">HuggingFace + MLflow</text>

  <!-- Arrow: Embedding -> Postgres -->
  <line x1="500" y1="210" x2="545" y2="125" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- MCP Server -->
  <rect x="700" y="190" width="160" height="80" rx="6" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="780" y="222" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="600">MCP Server</text>
  <text x="780" y="242" text-anchor="middle" fill="#9ca3af" font-size="11">LLM Tool Integration</text>

  <!-- Arrow: FastAPI -> MCP -->
  <line x1="780" y1="120" x2="780" y2="185" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Evaluation -->
  <rect x="60" y="190" width="170" height="80" rx="6" fill="none" stroke="#fb923c" stroke-width="1.5"/>
  <text x="145" y="222" text-anchor="middle" fill="#fdba74" font-size="13" font-weight="600">Evaluation</text>
  <text x="145" y="242" text-anchor="middle" fill="#9ca3af" font-size="11">NDCG + MeSH overlap</text>

  <!-- Arrow: Evaluation -> Embedding -->
  <line x1="230" y1="230" x2="295" y2="230" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Data flow labels -->
  <text x="205" y="68" text-anchor="middle" fill="#6b7280" font-size="9">XML</text>
  <text x="418" y="68" text-anchor="middle" fill="#6b7280" font-size="9">upsert</text>
  <text x="663" y="68" text-anchor="middle" fill="#6b7280" font-size="9">query</text>

  <!-- Bottom section: Infrastructure -->
  <rect x="30" y="320" width="830" height="70" rx="6" fill="none" stroke="#4b5563" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="60" y="348" fill="#6b7280" font-size="11" font-weight="600">Infrastructure</text>
  <text x="60" y="370" fill="#9ca3af" font-size="11">Docker Compose · GitHub Actions CI · Neon (prod) · Fly.io (prod)</text>

  <!-- Numbers -->
  <circle cx="100" cy="30" r="10" fill="#1e293b" stroke="#6b7280" stroke-width="1"/>
  <text x="100" y="34" text-anchor="middle" fill="#e5e7eb" font-size="10" font-weight="600">1</text>

  <circle cx="310" cy="30" r="10" fill="#1e293b" stroke="#60a5fa" stroke-width="1"/>
  <text x="310" y="34" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">2</text>

  <circle cx="545" cy="30" r="10" fill="#1e293b" stroke="#34d399" stroke-width="1"/>
  <text x="545" y="34" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600">3</text>

  <circle cx="780" cy="30" r="10" fill="#1e293b" stroke="#f472b6" stroke-width="1"/>
  <text x="780" y="34" text-anchor="middle" fill="#f9a8d4" font-size="10" font-weight="600">4</text>

  <circle cx="400" cy="180" r="10" fill="#1e293b" stroke="#fbbf24" stroke-width="1"/>
  <text x="400" y="184" text-anchor="middle" fill="#fde68a" font-size="10" font-weight="600">5</text>

  <circle cx="780" cy="180" r="10" fill="#1e293b" stroke="#a78bfa" stroke-width="1"/>
  <text x="780" y="184" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">6</text>
</svg>
